# syntax=docker/dockerfile:1.7
#
# Crit-Fumble Dockerfile for the Fermi fork. Produces a minimal nginx
# image serving the prebuilt SPA. AGPL-3.0; see LICENSE + MODIFICATIONS.md.
#
# This Dockerfile is separate from upstream's `Dockerfile` (which uses
# `npm start` for Fermi's own Node server). Ours is static-only —
# matches howToStaticallyHost.md and is what the CFG orchestration
# pulls. When the fork's path patches are sourceful (relative paths
# baked into source), the sed block below becomes a no-op and can be
# deleted.
#
# Build:
#   docker build -t ghcr.io/crit-fumble/cfg-fermi:local -f Dockerfile.cfg .
#
# Run standalone:
#   docker run --rm -p 8080:80 ghcr.io/crit-fumble/cfg-fermi:local
#
# Build args:
#   FERMI_BASE_PATH — sub-path prefix for asset/route URLs (default empty
#                     = root-hosted; CFG passes /apps/fermi).

ARG FERMI_BASE_PATH=""

# ── Builder: Fermi's own build pipeline ────────────────────────────────
FROM node:24-alpine AS builder
# Fermi's `buildnode.js` shells out to `git` for the build-time
# commit-hash stamp; alpine's node image doesn't ship git.
RUN apk add --no-cache git
WORKDIR /src
# npm ci would be stricter but Fermi ships a package-lock.json that
# doesn't always match the upstream package.json deps cleanly; use
# `npm install --no-audit` to match the manual build flow that's
# known to work.
COPY package.json package-lock.json* ./
RUN npm install --no-audit --no-fund
COPY . .
# Initialize a stub git repo if the build context isn't a checkout
# (e.g. when COPY'd from a clean dir). This satisfies `git rev-parse`
# inside buildnode.js without requiring the build context to be a
# real .git tree.
RUN if [ ! -d .git ]; then git init -q && git add -A && git -c user.email=build@cfg -c user.name=build commit -qm "build" >/dev/null; fi
RUN node buildnode.js && node build.js

# ── Path-prefix rewrite (transitional) ─────────────────────────────────
# Mirrors dev/scripts/fermi-build.sh's sed step. Rewrites root-absolute
# paths in the built bundle to be FERMI_BASE_PATH-prefixed so the
# bundle co-hosts under any sub-path. When the fork moves to real
# source-level relative paths (see docs/agent/fermi-fork-setup.md in
# the main Crit-Fumble repo), drop this block — the bundle will already
# carry the right paths.
ARG FERMI_BASE_PATH
RUN if [ -n "$FERMI_BASE_PATH" ]; then \
      echo "Rewriting absolute paths to $FERMI_BASE_PATH/* in /src/dist/webpage" && \
      # Rewrite rules below split into:
      #
      #   1. PATHNAME tests (pathname.startsWith("/...", pathname === "/..., etc.)
      #      Routes Fermi's boot-time `window.location.pathname` checks at the
      #      sub-path prefix. Safe to apply broadly because the patterns
      #      contain `pathname` which never appears in API calls.
      #
      #   2. ASSET paths (src/href attributes, url(...), specific resource
      #      string literals). These NEVER concatenate with the Spacebar API
      #      base — they're either inline HTML attributes or root-relative
      #      fetches (e.g. /emoji.bin, /translations/langs.js). Safe to
      #      bare-rewrite.
      #
      #   3. NAV literals (`,"","/channels/...`, `="/channels/...`, etc.)
      #      Used by history.pushState, window.location.href assignments. These
      #      MUST be rewritten so the URL bar shows /apps/fermi/channels/<id>
      #      (which Caddy + nginx then route to app.html).
      #
      #      ⚠ Critical: the SAME string literal `"/channels/"` appears in
      #      Spacebar API calls (`this.info.api + "/channels/<id>/messages"`).
      #      Those must NOT be rewritten — Spacebar's API mount point is
      #      /api/v9/channels/..., NOT /apps/fermi/api/v9/channels/.
      #      Discriminator: API patterns have `+` immediately before the
      #      opening quote (string concat); nav patterns have other chars
      #      (`,""`, `=`, `,`, space). Negation char class `[^+]` matches the
      #      one preceding char and skips API calls. (Template literals like
      #      `\${api}/channels/...` lack the leading quote entirely, so they
      #      naturally skip these rules.)
      find /src/dist/webpage -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' -o -name '*.mjs' -o -name '*.json' \) -exec sh -c ' \
        sed -i \
          -e "s|pathname.startsWith(\"/|pathname.startsWith(\"${FERMI_BASE_PATH}/|g" \
          -e "s|pathname === \"/|pathname === \"${FERMI_BASE_PATH}/|g" \
          -e "s|pathname===\"/|pathname===\"${FERMI_BASE_PATH}/|g" \
          -e "s|pathname = \"/|pathname = \"${FERMI_BASE_PATH}/|g" \
          -e "s|pathname=\"/|pathname=\"${FERMI_BASE_PATH}/|g" \
          -e "s|src=\"/\([^/]\)|src=\"${FERMI_BASE_PATH}/\1|g" \
          -e "s|href=\"/\([^/]\)|href=\"${FERMI_BASE_PATH}/\1|g" \
          -e "s|srcset=\"/\([^/]\)|srcset=\"${FERMI_BASE_PATH}/\1|g" \
          -e "s|url(/\([^/]\)|url(${FERMI_BASE_PATH}/\1|g" \
          -e "s|url(\"/\([^/]\)|url(\"${FERMI_BASE_PATH}/\1|g" \
          -e "s|url('"'"'/\([^/]\)|url('"'"'${FERMI_BASE_PATH}/\1|g" \
          -e "s|\([^+]\)\"/channels/|\1\"${FERMI_BASE_PATH}/channels/|g" \
          -e "s|\([^+]\)'"'"'/channels/|\1'"'"'${FERMI_BASE_PATH}/channels/|g" \
          -e "s|\([^+]\)\"/invite/|\1\"${FERMI_BASE_PATH}/invite/|g" \
          -e "s|\([^+]\)'"'"'/invite/|\1'"'"'${FERMI_BASE_PATH}/invite/|g" \
          -e "s|\([^+]\)\"/template/|\1\"${FERMI_BASE_PATH}/template/|g" \
          -e "s|\([^+]\)'"'"'/template/|\1'"'"'${FERMI_BASE_PATH}/template/|g" \
          -e "s|\"/instances.json\"|\"${FERMI_BASE_PATH}/instances.json\"|g" \
          -e "s|\"/style.css\"|\"${FERMI_BASE_PATH}/style.css\"|g" \
          -e "s|\"/themes.css\"|\"${FERMI_BASE_PATH}/themes.css\"|g" \
          -e "s|\"/logo.svg\"|\"${FERMI_BASE_PATH}/logo.svg\"|g" \
          -e "s|\"/logo.webp\"|\"${FERMI_BASE_PATH}/logo.webp\"|g" \
          -e "s|\"/index.js\"|\"${FERMI_BASE_PATH}/index.js\"|g" \
          -e "s|\"/translations/|\"${FERMI_BASE_PATH}/translations/|g" \
          -e "s|'"'"'/translations/|'"'"'${FERMI_BASE_PATH}/translations/|g" \
          -e "s|\"/audio/|\"${FERMI_BASE_PATH}/audio/|g" \
          -e "s|'"'"'/audio/|'"'"'${FERMI_BASE_PATH}/audio/|g" \
          -e "s|\"/emoji.bin\"|\"${FERMI_BASE_PATH}/emoji.bin\"|g" \
          -e "s|\"/getupdates\"|\"${FERMI_BASE_PATH}/getupdates\"|g" \
          -e "s|\"/files.json\"|\"${FERMI_BASE_PATH}/files.json\"|g" \
          "$1"; \
      ' _ {} \; ; \
    fi

# ── Runtime: nginx serving the static bundle ───────────────────────────
FROM nginx:1.27-alpine AS runtime
COPY --from=builder /src/dist/webpage /usr/share/nginx/html
COPY ops/nginx.conf /etc/nginx/conf.d/default.conf
EXPOSE 80

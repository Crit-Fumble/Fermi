name: release

# Build the production Docker image and push to GitHub Container Registry.
#
# Triggered on `v*` tag pushes (e.g. `git tag v0.1.0 && git push --tags`),
# on push to `main` (publishes a `main` + sha tag for the orchestration's
# rolling default), and manually via the Actions UI for one-off rebuilds.
# The image is pushed to ghcr.io/crit-fumble/cfg-fermi with these tags:
#   - the git ref (e.g. v0.1.0) when a tag is pushed
#   - `latest` (only on default-branch tag pushes)
#   - `main` (on every push to main)
#   - `sha-<short-sha>` (always)
#
# Mirrors cfg-core-server / cfg-server-disrecord release.yml. Differences:
#   - No private @crit-fumble/* packages → no npmrc BuildKit secret
#   - Build uses Dockerfile.cfg (CFG packaging) — upstream's `Dockerfile`
#     is preserved for upstream-style `npm start` use cases
#   - FERMI_BASE_PATH build-arg defaults to /apps/fermi (matches the CFG
#     orchestration's sub-path mount). Override at workflow_dispatch time
#     if you need a different prefix.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      base_path:
        description: 'FERMI_BASE_PATH build-arg (default /apps/fermi).'
        required: false
        default: '/apps/fermi'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the in-image `git rev-parse` in buildnode.js
          # picks up the right commit hash. Shallow clones break it.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/crit-fumble/cfg-fermi
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.cfg
          target: runtime
          # Multi-arch — dev workstations may be ARM (Apple Silicon),
          # prod runs amd64 droplets. Building both keeps the same tag
          # pullable everywhere.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            FERMI_BASE_PATH=${{ inputs.base_path || '/apps/fermi' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

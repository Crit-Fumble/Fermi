server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Fermi's documented SPA routes (howToStaticallyHost.md): each prefix
    # maps to a specific HTML entry point, NOT a generic SPA-fallback to
    # index.html. Works at root-hosting (request `/channels/foo`) AND at
    # sub-path-hosting (request `/apps/fermi/channels/foo` — same regex
    # tail match).
    rewrite ^.*/channels/.*$ /app.html last;
    rewrite ^.*/invite/.*$   /invite.html last;
    rewrite ^.*/template/.*$ /template.html last;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # AGPL source-availability — surfaced on every response so a user
    # inspecting headers can find the source. The App Manager footer
    # in CFG also carries this link for the in-UI path.
    add_header X-Source "https://github.com/Crit-Fumble/Fermi (AGPL-3.0, forked from https://github.com/MathMan05/Fermi)" always;

    # Compress text payloads; the build output is mostly JS + HTML + CSS.
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
